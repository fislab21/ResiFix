<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResiFix – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="container">

      <!-- Logo -->
      <div class="logo-block">
        <div class="logo-icon">
          <!-- Wrench SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91
              6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <h1 class="app-name">ResiFix</h1>
        <p class="app-subtitle">University Residence Maintenance Portal</p>
      </div>

      <!-- Card -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Welcome Back</h2>
          <p class="card-description">Sign in to your account</p>
        </div>

        <div class="card-content">
          <form id="loginForm" novalidate>

            <!-- Error message -->
            <div id="errorMsg" class="error-box hidden" role="alert">
              <!-- Alert icon -->
              <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span id="errorText"></span>
            </div>

            <!-- Email field -->
            <div class="form-group">
              <label for="email" class="form-label">Email</label>
              <div class="input-wrapper">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
                <input
                  id="email"
                  type="email"
                  name="email"
                  placeholder="you@university.edu"
                  class="form-input"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <!-- Password field -->
            <div class="form-group">
              <label for="password" class="form-label">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input
                  id="password"
                  type="password"
                  name="password"
                  placeholder="••••••••"
                  class="form-input"
                  required
                  autocomplete="current-password"
                />
              </div>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
          </form>

          <!-- Demo credentials -->
          <div class="demo-box">
            <p class="demo-label">Demo Accounts</p>
            <div class="demo-list">
              <p><span class="demo-role">Student:</span> ahmed@university.edu / student123</p>
              <p><span class="demo-role">Worker:</span> karim@university.edu / worker123</p>
              <p><span class="demo-role">Admin:</span> admin@university.edu / admin123</p>
            </div>
          </div>
        </div>
      </div><!-- /card -->

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
